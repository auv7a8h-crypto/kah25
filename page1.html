  <style>
    * { box-sizing: border-box; }

:root{
  --grad-color: rgba(233,233,233,1);
  --text-color: #000;
  --subtext-color:#000;
  --link-color:#000;
}

    body {
margin: 0; 
font-family: 'Nanum Gothic', Gothic; 
background-color: 
white; 
  color:var(--text-color);
 }

    header { 
font-size: 1.4rem; 
font-weight: bold;
padding: 1rem; 
cursor:pointer; 
background:#fff; 
border-bottom:1px 
solid #eee;
 }

    .wrap { 
width:1200px; 
margin:20px auto;
 }

.banner{
  position:relative;
  height:330px;
  background:#e5e5e5;
  overflow:hidden;

  max-width:1200px;
  margin:0 auto;
  border-radius:8px;
}

.banner-img{
  position:absolute;
  inset:0;
}

.banner-img img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:right center;
  display:block;
}

.banner-gradient{
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    var(--grad-color) 0%,
    var(--grad-color) 50%,
    transparent 55%
  );
  pointer-events:none;
}

.top-section{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  align-items: flex-start;
  padding-left:50px;
  padding-top:50px;
  padding-bottom:50px;
}

.info{
  max-width:500px;
  max-height:300px;
}

    .info h1 { 
margin: 0 0 0 0; 
word-break:keep-all;
font-size: 3.2rem; 
color: var(--text-color);
  line-height: 1.2;
 }

#author { 
margin: 0.2rem 0 0 0; 
font-size: 1.2rem; 
  color:var(--subtext-color);
 }

#desc { 
font-size: 0.9rem; 
  color:var(--subtext-color);
  position: absolute;
margin: 10px 0 20px;
  top: 180px;
  left: 50px;
  max-width: 400px;
    word-break: keep-all;
 }

    .links { 
margin-top: 0.75rem;
  align-items: flex-end;
  position: absolute;
  bottom: 50px;
  left: 50px;
  max-width: 400px;
 }

    .links a { 
font-size: 0.7rem; 
margin-right: 1rem; 
text-decoration: none; 
  color:var(--link-color);
 }

    #episodeListView { 
background: white;
 }

#episodeListView ul { 
list-style:none;
padding:24px 0 160px;
margin:0 auto;
max-width:1200px;
}

    #episodeList { 
padding: 0; 
margin: 0;
 }

    #episodeList li {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 0;
      margin: 0;
      background: #ffffff;
      cursor: pointer;
      border-top: 1px solid #eee;
    }

    #episodeList li:hover { 
background: #faf8f6;
 }

    #episodeList li img {
width: 160px; 
height: 100px; 
object-fit: cover; 
flex-shrink: 0; 
border-radius:4px;
    }

    .ep-meta { 
display:flex; 
flex-direction:column; 
justify-content:center; 
min-width:0; 
overflow:hidden;
 }

    .ep-title {
 font-size:1.15rem; 
color:#222; 
margin:0 0 0.25rem 0; 
word-break:break-word;
 }



    @media screen and (max-width: 480px) {
  body {
    overflow-x: hidden;
  }

  .wrap {
    width: 100%;
    margin: 0;
    padding: 0;
  }

.banner{
width:100%;
height:auto;
    border-radius:0;
    overflow:hidden;
}

  .banner-img{
    position:relative;
    inset:auto;
    z-index:0;
height:220px;   /* 원하는 높이 */
overflow:hidden;
  }

  .banner-img img{
    display:block;
    width:100%;
height:100%;
    border-radius:0;
object-fit:cover;
object-position:right;
  }

.banner-gradient{
    position:absolute;
    left:0;
    right:0;
    top:0;
    bottom:auto;
    height:220px;
    z-index:1;
background:linear-gradient(
  180deg,
  rgba(255,255,255,0) 90%,
  rgba(255,255,255,1) 100%
);
    pointer-events:none;
}

.top-section{
    position:relative;
    z-index:2;
    display:block;
    height:auto;
    background:#fff;
  align-items: flex-start;
  padding-left:0px;
  padding-top:10px;
  padding-bottom:10px;
}

.info{
    padding:0px 16px 0px;
  max-width:auto;
  max-height:auto;
}

.info h1{
font-size:2rem;
    color: #000;
margin: 0 0 0 0;

}

#author { 
margin: 0.2rem 0 0 0; 
font-size: 1rem; 
    color: #000;
 }

#desc { 
font-size: 0.8rem; 
  position: relative;
    color: #000;
  top: 10px;
  left: 0px;
  max-width: 400px;
 }

    .links {

  left: 0px;
  max-width: 400px;
 }

  .links a{

  }

      #episodeListView ul {

width: 80px; 
height: 50px; 
border-radius:4px;
 }

font-size:0.95rem; 
margin:0;
 }

    }
  </style>

const params = new URLSearchParams(window.location.search);
const workId = params.get("workId") || params.get("id");
const data = works[workId];

    if (!data) {
      document.body.innerHTML = '<p style="padding:2rem;">작품을 찾을 수 없습니다. 올바른 id로 접속했는지 확인하세요.</p>';
throw new Error('No work data for id=' + workId);
    }

    // 기본 정보 채우기
    document.getElementById('title').textContent = data.title;
    document.getElementById('author').textContent = data.author;
    document.getElementById('desc').textContent = data.description;
    const banner = document.getElementById('banner');

banner.innerHTML = data.bannerImage
? `<img src="${data.bannerImage}" alt="배너">`
: '';
    document.getElementById('reviewLink').href = data.links?.review || '#';
    document.getElementById('backupLink').href = data.links?.backup || '#';

const title = document.getElementById('title');
const text = title.textContent;

const isMobile = window.innerWidth <= 480;

if (isMobile) {
  if (text.length > 10) {
    title.style.fontSize = '1.8rem';
  }
} else {
  if (text.length > 10) {
    title.style.fontSize = '2.5rem';
    title.innerHTML = text.slice(0, 15) + '<br>' + text.slice(15);
  }
}

    // 회차 목록 생성 (index 기준: 0 => 1화)
const list = document.getElementById('episodeList');
list.innerHTML = '';

data.episodes.forEach((ep, index) => {
  const li = document.createElement('li');
  const thumbSrc = ep.thumbnail || (ep.images && ep.images[0]) || '';

  li.innerHTML = `
    <img src="${thumbSrc}" alt="썸네일">
    <div class="ep-meta">
      <div class="ep-title">${ep.title}</div>
    </div>
  `;

  li.addEventListener('click', () => {
    const bookViewerIds = ['2503', '2520', '2526', '26'];

    const viewer = bookViewerIds.includes(workId)
      ? 'bookviewer.html'
      : 'viewer.html';

    location.href = `${viewer}?workId=${encodeURIComponent(workId)}&ep=${index}`;
  });

  list.appendChild(li);
});

const wrap = document.querySelector(".wrap");

if (data.gradColor) {
  wrap.style.setProperty("--grad-color", data.gradColor);
}

if (data.textColor === "white") {
  wrap.style.setProperty("--text-color", "white");
  wrap.style.setProperty("--subtext-color", "white");
  wrap.style.setProperty("--link-color", "white");
} else {
  wrap.style.setProperty("--text-color", "#000");
  wrap.style.setProperty("--subtext-color", "#000");
  wrap.style.setProperty("--link-color", "#000");
}
