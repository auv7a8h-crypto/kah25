    body {
margin: 0; 
font-family: 'Nanum Gothic', Gothic; 
background-color: 
white; color:#111;
 }

    header { 
font-size: 1.4rem; 
font-weight: bold;
padding: 1rem; 
cursor:pointer; 
background:#fff; 
border-bottom:1px 
solid #eee;
 }

    .wrap { 
max-width:1400px; 
margin:0 auto;
 }

    .top-section {

      gap: 1rem;

      align-items: center;
      padding: 2rem;
      padding-left: 2rem;
    }

max-width: 260px; 
height: auto; 
display:block;

    .info {
 flex:1;

margin: 0 0 0.5rem 0;

font-size: 2rem;

font-size: 0.9rem;

 }

    .links { 
margin-top: 0.75rem;

 }

    .links a { 
font-size: 0.7rem; 
margin-right: 1rem; 
text-decoration: none; 
color: #000;
 }

    #episodeListView { 
background: white;
 }

    #episodeListView ul { 
list-style: none; 
padding: 24px 5% 
160px; margin: 0 auto; 
max-width: 1400px;
 }

    #episodeList { 
padding: 0; 
margin: 0;
 }

    #episodeList li {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 0;
      margin: 0;
      background: #ffffff;
      cursor: pointer;
      border-top: 1px solid #eee;
    }

    #episodeList li:hover { 
background: #faf8f6;
 }

    #episodeList li img {
width: 160px; 
height: 100px; 
object-fit: cover; 
flex-shrink: 0; 
border-radius:4px;
    }

    .ep-meta { 
display:flex; 
flex-direction:column; 
justify-content:center; 
min-width:0; 
overflow:hidden;
 }

    .ep-title {
 font-size:1.15rem; 
color:#222; 
margin:0 0 0.25rem 0; 
word-break:break-word;
 }

    .ep-sub { 
font-size:0.95rem; 
color:#666;
 }

    /* responsive */

    @media screen and (max-width: 768px) {

      .top-section {
 flex-direction:row; 
padding:1rem; 
gap:0.75rem; 
align-items:flex-start;
 }

      .banner img {
max-width:120px;
 }

      .info h1 { 
font-size:1.15rem;
 }

padding: 12px 5% 120px;

gap:0.6rem;

font-size:0.95rem; 
margin:0;

font-size:0.8rem;

    }

    document.getElementById('backupLink').href = data.links?.backup || '#';

    const list = document.getElementById('episodeList');
    list.innerHTML = '';
    data.episodes.forEach((ep, index) => {
      const li = document.createElement('li');
      const thumbSrc = ep.thumbnail || (ep.images && ep.images[0]) || '';
      li.innerHTML = `
        <img src="${thumbSrc}" alt="썸네일">
        <div class="ep-meta">
          <div class="ep-title">${ep.title}</div>
          <div class="ep-sub">회차 ${index + 1}</div>
        </div>
      `;
      li.addEventListener('click', () => {
        // viewer로 이동: id와 ep(index)를 쿼리로 전달
location.href = `viewer.html?workId=${encodeURIComponent(workId)}&ep=${index}`;      });

    });
