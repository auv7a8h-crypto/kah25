<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>출판만화 뷰어</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      color: #111;
      font-family: 'Nanum Gothic', serif;
      overflow: hidden;
    }

    body {
      position: relative;
    }

    .viewer-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background: #fff;
      border-bottom: 1px solid #eee;
      z-index: 1000;
      transition: transform 0.25s ease;
    }

    .viewer-bar.hidden {
      transform: translateY(-100%);
    }

    .viewer-bar .title {
      flex: 1;
      text-align: center;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-bar button,
    .nav-bottom button {
      background: none;
      border: 0;
      cursor: pointer;
      font-size: 0.95rem;
      color: #111;
    }

    .viewer-bar .side {
      width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

.stage {
  position: fixed;
  inset: 0;
  padding: 0;
  background: #fff;
  overflow: hidden;
  touch-action: pan-y pinch-zoom;
}

/* 실제 페이지가 들어가는 영역: 상단/하단 바를 뺀 높이 */
.spread-wrap {
  position: absolute;
  inset: 0;
  overflow: hidden;
  background: #fff;
}

.spread {
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: flex-start;
  align-items: stretch;
  gap: 0;
  padding: 0;
  background: #fff;
}

.page-slot {
  height: 100%;
  display: flex;
  align-items: stretch;
  overflow: hidden;
  background: #fff;
}

.page-slot.single {
  width: auto;
  justify-content: center;
}

.page-slot.double {
  flex: 0 0 50%;
  width: 50%;
}

/* 양면일 때 왼쪽 칸 이미지는 가운데(오른쪽)로 붙임 */
.page-slot.double:first-child {
  justify-content: flex-end;
}

/* 양면일 때 오른쪽 칸 이미지는 가운데(왼쪽)로 붙임 */
.page-slot.double:last-child {
  justify-content: flex-start;
}

.page-slot img {
  display: block;
  width: auto;
  height: 100%;
  max-width: none;
  max-height: none;
  object-fit: fill;
  user-select: none;
  -webkit-user-drag: none;
  pointer-events: none;
}

    .nav-bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: #fff;
      border-top: 1px solid #eee;
      z-index: 1000;
      transition: transform 0.25s ease;
    }

    .nav-bottom.hidden {
      transform: translateY(100%);
    }

    .nav-bottom button {
      padding: 0.45rem 0.8rem;
      border-radius: 6px;
    }

    .nav-bottom button:disabled {
      opacity: 0.35;
      cursor: default;
    }

.tap-zone {
  position: absolute;
  top: 0;
  bottom: 0;
  z-index: 20;
}

    .tap-zone.left {
      left: 0;
      width: 25%;
    }

    .tap-zone.center {
      left: 25%;
      width: 50%;
    }

    .tap-zone.right {
      right: 0;
      width: 25%;
    }

    .page-indicator {
      position: fixed;
      right: 14px;
      bottom: 74px;
      z-index: 900;
      background: rgba(255,255,255,0.9);
      border: 1px solid #eee;
      border-radius: 999px;
      padding: 0.35rem 0.6rem;
      font-size: 0.8rem;
      transition: opacity 0.2s ease;
    }

    .page-indicator.hidden {
      opacity: 0;
      pointer-events: none;
    }

@media (orientation: portrait) {
  .spread {
    gap: 0;
    padding: 0;
    justify-content: center;
    align-items: center;
  }

  .page-slot.single {
    width: 100%;
    flex: 0 0 100%;
    justify-content: center;
    align-items: center;
  }

  .page-slot.single img {
    width: 100%;
    height: auto;
    max-width: 100%;
    max-height: none;
    object-fit: contain;
  }
}
  </style>
</head>

    const params = new URLSearchParams(location.search);
    const id = params.get('workId');
    let ep = parseInt(params.get('ep') || '0', 10);
    let page = parseInt(params.get('page') || '0', 10);

    const data = works[id];

    if (!data) {
      document.body.innerHTML = `
        <div style="padding:2rem; font-family:sans-serif;">
          잘못된 작품입니다.
        </div>
      `;
      throw new Error('No work data for id=' + id);

    // 우철(오른쪽 방향 넘김)로 볼 회차 설정
    // 형식: 작품id: [회차인덱스, 회차인덱스]
    const rightBindingEpisodes = {
      '2503': [0],
      '2520': [0, 1],
      '26': [7, 11]
    };

    const viewerBar = document.getElementById('viewerBar');
    const navBottom = document.getElementById('navBottom');
    const viewerTitle = document.getElementById('viewerTitle');
    const spread = document.getElementById('spread');
    const pageIndicator = document.getElementById('pageIndicator');

    const prevEpBtn = document.getElementById('prevEpBtn');
    const nextEpBtn = document.getElementById('nextEpBtn');
    const listBtn = document.getElementById('listBtn');
    const btnBack = document.getElementById('btnBack');

    const tapLeft = document.getElementById('tapLeft');
    const tapCenter = document.getElementById('tapCenter');
    const tapRight = document.getElementById('tapRight');

    let isBarVisible = true;
    let touchStartX = 0;
    let touchStartY = 0;

    function isPortraitLike() {
      return window.innerHeight > window.innerWidth;
    }

    function getPagesPerView() {
      return isPortraitLike() ? 1 : 2;
    }

    function isRightBindingEpisode() {
      const list = rightBindingEpisodes[id] || [];
      return list.includes(ep);
    }

    function getEpisode() {
      return data.episodes[ep];
    }

    function getTotalPages() {
      return getEpisode().images.length;
    }

    function getStep() {
      return getPagesPerView();
    }

function clampPage(value) {
  const totalPages = getTotalPages();

  if (totalPages <= 0) return 0;

  return Math.max(0, Math.min(value, totalPages - 1));
}

function getVisiblePages() {
  const episode = getEpisode();
  const pagesPerView = getPagesPerView();
  const total = episode.images.length;
  page = clampPage(page);

  if (pagesPerView === 1) {
    return [page];
  }

  const isRightBinding = isRightBindingEpisode();

  // 첫 펼침
  if (page === 0) {
    if (isRightBinding) {
      // 우철: 첫 페이지가 왼쪽
      return [0, null];
    } else {
      // 좌철: 첫 페이지가 오른쪽
      return [null, 0];
    }
  }

  // 두 번째 펼침부터
  if (isRightBinding) {
    // 우철: 오른쪽에서 왼쪽으로 읽음
    const rightPage = page;
    const leftPage = page + 1;

    return [
      leftPage < total ? leftPage : null,
      rightPage < total ? rightPage : null
    ];
  } else {
    // 좌철: 왼쪽에서 오른쪽으로 읽음
    const leftPage = page;
    const rightPage = page + 1;

    return [
      leftPage < total ? leftPage : null,
      rightPage < total ? rightPage : null
    ];
  }
}

    function makePageSlot(src, alt, mode) {
      const slot = document.createElement('div');
      slot.className = `page-slot ${mode}`;

      if (src) {
        const img = document.createElement('img');
        img.src = src;
        img.alt = alt;
        slot.appendChild(img);
      }

      return slot;
    }

    function updateTitle() {
      const episode = getEpisode();
      viewerTitle.textContent = `${data.title} · ${episode.title}`;
    }

    function updateEpisodeButtons() {
      prevEpBtn.disabled = ep <= 0;
      nextEpBtn.disabled = ep >= data.episodes.length - 1;
    }

    function updatePageIndicator() {
      const totalPages = getTotalPages();
      const pagesPerView = getPagesPerView();

      if (pagesPerView === 1) {
        pageIndicator.textContent = `${page + 1} / ${totalPages}`;
        return;
      }

      const spreadIndex = Math.floor(page / 2) + 1;
      const totalSpreads = Math.ceil(totalPages / 2);
      pageIndicator.textContent = `${spreadIndex} / ${totalSpreads}`;
    }

    function updateHistory() {
      history.replaceState(
        { id, ep, page },
        '',
        `bookviewer.html?workId=${encodeURIComponent(id)}&ep=${ep}&page=${page}`
      );
    }

    function renderSpread() {
      const episode = getEpisode();
      const pagesPerView = getPagesPerView();
      const visiblePages = getVisiblePages();

      spread.innerHTML = '';
      updateTitle();
      updateEpisodeButtons();
      updatePageIndicator();

      if (pagesPerView === 1) {
        const index = visiblePages[0];
        const src = episode.images[index];
        spread.appendChild(
          makePageSlot(src, `${episode.title} ${index + 1}p`, 'single')
        );
      } else {
        visiblePages.forEach((index) => {
          const src = index === null ? null : episode.images[index];
          const alt = index === null ? '' : `${episode.title} ${index + 1}p`;
          spread.appendChild(
            makePageSlot(src, alt, 'double')
          );
        });
      }

      updateHistory();
    }

let nextEpisodeTimeout = null;
let nextEpisodeToast = null;

function showNextEpisodeToast() {
  if (nextEpisodeToast) {
    nextEpisodeToast.remove();
  }

  nextEpisodeToast = document.createElement('div');
  nextEpisodeToast.textContent = '3초 후 다음 화로 이동합니다';
  nextEpisodeToast.style.position = 'fixed';
  nextEpisodeToast.style.left = '50%';
  nextEpisodeToast.style.bottom = '50%';
  nextEpisodeToast.style.transform = 'translateX(-50%)';
  nextEpisodeToast.style.padding = '10px 16px';
  nextEpisodeToast.style.background = 'rgba(255, 255, 255, 0.8)';
  nextEpisodeToast.style.color = '#000';
  nextEpisodeToast.style.fontSize = '14px';
  nextEpisodeToast.style.borderRadius = '10px';
  nextEpisodeToast.style.zIndex = '3000';
  nextEpisodeToast.style.pointerEvents = 'none';

  document.body.appendChild(nextEpisodeToast);
}

function clearNextEpisodeToast() {
  if (nextEpisodeTimeout) {
    clearTimeout(nextEpisodeTimeout);
    nextEpisodeTimeout = null;
  }

  if (nextEpisodeToast) {
    nextEpisodeToast.remove();
    nextEpisodeToast = null;
  }
}

function goNextPage() {
  const total = getTotalPages();
  const pagesPerView = getPagesPerView();

  let next;

  if (pagesPerView === 1) {
    next = clampPage(page + 1);
  } else {
    next = page === 0 ? 1 : page + 2;
  }

  // 다음 페이지가 있으면 그냥 넘김
  if (next < total && next !== page) {
    clearNextEpisodeToast();
    page = next;
    renderSpread();
    return;
  }

  // 마지막 페이지에서 한 번 더 넘긴 경우
  if (ep < data.episodes.length - 1) {
    // 이미 3초 대기 중인데 또 누르면 바로 다음 화
    if (nextEpisodeTimeout) {
      clearNextEpisodeToast();
      goNextEpisode();
      return;
    }

    showNextEpisodeToast();

    nextEpisodeTimeout = setTimeout(() => {
      clearNextEpisodeToast();
      goNextEpisode();
    }, 3000);
  }
}

function goPrevPage() {
  clearNextEpisodeToast();
  const pagesPerView = getPagesPerView();

  if (pagesPerView === 1) {
    const prev = clampPage(page - 1);
    if (prev !== page) {
      page = prev;
      renderSpread();
    }
    return;
  }

  const prev = page <= 1 ? 0 : page - 2;

  if (prev !== page) {
    page = prev;
    renderSpread();
  }
}
    function goNextEpisode() {
  clearNextEpisodeToast();
      if (ep < data.episodes.length - 1) {
        ep += 1;
        page = 0;
        renderSpread();
      }
    }

    function goPrevEpisode() {
  clearNextEpisodeToast();
      if (ep > 0) {
        ep -= 1;
        page = 0;
        renderSpread();
      }
    }

    function toggleBars(force) {
      const show = force === undefined ? !isBarVisible : force;

      if (show) {
        viewerBar.classList.remove('hidden');
        navBottom.classList.remove('hidden');
        pageIndicator.classList.remove('hidden');
        isBarVisible = true;
      } else {
        viewerBar.classList.add('hidden');
        navBottom.classList.add('hidden');
        pageIndicator.classList.add('hidden');
        isBarVisible = false;
      }
    }

// 탭 동작
// 좌철: 왼쪽 탭 = 이전 / 오른쪽 탭 = 다음
// 우철: 왼쪽 탭 = 다음 / 오른쪽 탭 = 이전
tapLeft.addEventListener('click', () => {
  if (isRightBindingEpisode()) {
    goNextPage();
  } else {
    goPrevPage();
  }
});

tapRight.addEventListener('click', () => {
  if (isRightBindingEpisode()) {
    goPrevPage();
  } else {
    goNextPage();
  }
});

    tapCenter.addEventListener('click', () => {
      toggleBars();
    });

    // 스와이프
    document.getElementById('stage').addEventListener('touchstart', (e) => {
      const t = e.changedTouches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }, { passive: true });

    document.getElementById('stage').addEventListener('touchend', (e) => {
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      const absX = Math.abs(dx);
      const absY = Math.abs(dy);

      if (absX < 30 || absX < absY) return;

      const rightBinding = isRightBindingEpisode();

      if (rightBinding) {
        // 우철: 오른쪽으로 스와이프하면 다음
        if (dx > 0) {
          goNextPage();
        } else {
          goPrevPage();
        }
      } else {
        // 일반: 왼쪽으로 스와이프하면 다음
        if (dx < 0) {
          goNextPage();
        } else {
          goPrevPage();
        }
      }
    }, { passive: true });

// 방향키
window.addEventListener('keydown', (e) => {
  if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;

  const rightBinding = isRightBindingEpisode();

  if (rightBinding) {
    // 우철: 왼쪽 화살표 = 다음 / 오른쪽 화살표 = 이전
    if (e.key === 'ArrowLeft') {
      goNextPage();
    } else if (e.key === 'ArrowRight') {
      goPrevPage();
    }
  } else {
    // 좌철: 오른쪽 화살표 = 다음 / 왼쪽 화살표 = 이전
    if (e.key === 'ArrowRight') {
      goNextPage();
    } else if (e.key === 'ArrowLeft') {
      goPrevPage();
    }
  }
});

    prevEpBtn.addEventListener('click', goPrevEpisode);
    nextEpBtn.addEventListener('click', goNextEpisode);

    listBtn.addEventListener('click', () => {
      location.href = `page1.html?workId=${encodeURIComponent(id)}`;
    });

    btnBack.addEventListener('click', () => {
      if (document.referrer && document.referrer.includes('page1.html')) {
        history.back();
      } else {
        location.href = `page1.html?workId=${encodeURIComponent(id)}`;
      }
    });

    window.addEventListener('resize', () => {
      page = clampPage(page);
      renderSpread();
    });

    window.addEventListener('popstate', (e) => {
      const state = e.state;

      if (state && state.id === id) {
        ep = typeof state.ep === 'number' ? state.ep : ep;
        page = typeof state.page === 'number' ? state.page : 0;
        renderSpread();
      } else {
        location.href = `page1.html?workId=${encodeURIComponent(id)}`;
      }
    });

    ep = Math.max(0, Math.min(ep, data.episodes.length - 1));
    page = clampPage(page);
    renderSpread();
  </script>
